<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>1960年代新莊地主遊戲</title>
<style>
body {
  margin: 0;
  font-family: Arial, "Noto Sans TC", sans-serif;
  background: linear-gradient(#f7e7c6, #d6b98c);
  text-align: center;
}

.game {
  max-width: 850px;
  margin: 35px auto;
  background: white;
  padding: 30px;
  border-radius: 24px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

h1 {
  color: #5b3a29;
}

.scene {
  height: 260px;
  background: linear-gradient(#8fd3ff 0%, #cdefff 45%, #7dbb55 45%, #4f8f35 100%);
  border-radius: 20px;
  margin: 25px 0;
  position: relative;
  overflow: hidden;
  border: 4px solid #8b5a2b;
}

.sun {
  position: absolute;
  top: 20px;
  right: 45px;
  font-size: 55px;
  animation: sunMove 3s infinite alternate;
}

.cloud {
  position: absolute;
  top: 35px;
  left: -120px;
  font-size: 42px;
  animation: cloudMove 12s linear infinite;
}

.character {
  position: absolute;
  bottom: 40px;
  left: 40px;
  font-size: 55px;
  animation: walk 2s infinite alternate;
}

.land {
  position: absolute;
  bottom: 35px;
  width: 100%;
  font-size: 55px;
  animation: pop 0.8s;
}

.effect {
  position: absolute;
  top: 100px;
  width: 100%;
  font-size: 42px;
  animation: sparkle 1.2s infinite alternate;
}

@keyframes sunMove {
  from { transform: translateY(0) rotate(0deg); }
  to { transform: translateY(15px) rotate(20deg); }
}

@keyframes cloudMove {
  from { left: -120px; }
  to { left: 100%; }
}

@keyframes walk {
  from { transform: translateX(0) rotate(-5deg); }
  to { transform: translateX(40px) rotate(5deg); }
}

@keyframes pop {
  0% { opacity: 0; transform: scale(0.5); }
  70% { transform: scale(1.15); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes sparkle {
  from { opacity: 0.4; transform: translateY(0); }
  to { opacity: 1; transform: translateY(-15px); }
}

.shake {
  animation: shake 0.5s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-8px); }
  100% { transform: translateX(0); }
}

#text {
  font-size: 23px;
  line-height: 1.7;
  color: #333;
}

button {
  display: block;
  width: 100%;
  margin: 14px 0;
  padding: 16px;
  font-size: 19px;
  border: none;
  border-radius: 14px;
  background: #8b5a2b;
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  background: #6d421f;
  transform: scale(1.03);
}

.restart {
  background: #4f7c52;
}

.note {
  background: #fff4d6;
  padding: 15px;
  border-radius: 14px;
  margin-top: 20px;
  font-size: 16px;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="game">
  <h1>1960年代新莊地主人生</h1>

  <div class="scene" id="sceneBox">
    <div class="sun">☀️</div>
    <div class="cloud">☁️</div>
    <div class="effect" id="effect"></div>
    <div class="character" id="character">👨‍🌾</div>
    <div class="land" id="sceneImage">🌾 🌾 🌾 🌾 🌾</div>
  </div>

  <p id="text">
    你成為了1960年代在新莊擁有農地的地主，請陸續回答下列問題。<br><br>
    面臨無人願意務農，你會選擇？
  </p>

  <div id="choices">
    <button onclick="abandonLand()">A. 荒廢農地</button>
    <button onclick="rentLand()">B. 租給別人</button>
  </div>

  <div id="note" class="note">
    歷史提示：1960年代的新莊逐漸受到都市化與工業化影響，農地使用方式開始改變。
  </div>
</div>

<script>
function animateScene(emoji, character, effect, shake) {
  var scene = document.getElementById("sceneImage");
  var person = document.getElementById("character");
  var fx = document.getElementById("effect");
  var box = document.getElementById("sceneBox");

  scene.innerHTML = emoji;
  person.innerHTML = character;
  fx.innerHTML = effect;

  scene.style.animation = "none";
  void scene.offsetWidth;
  scene.style.animation = "pop 0.8s";

  if (shake) {
    box.classList.add("shake");
    setTimeout(function() {
      box.classList.remove("shake");
    }, 600);
  }
}

function abandonLand() {
  animateScene("🌿 🌿 🏚️ 🌿 🌿", "😟", "🍂 🍂 🍂", true);

  document.getElementById("text").innerHTML =
    "恭喜，這塊土地要等到40年後才會迎來都更。<br><br>你會把土地賣給政府嗎？";

  document.getElementById("choices").innerHTML =
    '<button onclick="sellLand()">A. 會</button>' +
    '<button onclick="notSellLand()">B. 不會</button>';

  document.getElementById("note").innerHTML =
    "歷史提示：部分農地因務農人口減少、農業收益下降而閒置，等待未來都市開發。";
}

function sellLand() {
  animateScene("🏗️ 🏢 🏢 🏢 🏗️", "🤑", "💰 💰 💰", false);

  document.getElementById("text").innerHTML =
    "土地增值，賺大錢！";

  document.getElementById("choices").innerHTML =
    '<button class="restart" onclick="restart()">重新開始</button>';

  document.getElementById("note").innerHTML =
    "歷史提示：隨著都市開發與土地重劃，原本的農地可能變成住宅、道路或公共建設。";
}

function notSellLand() {
  animateScene("🏢 🏚️ 🏢 🏢 🏢", "😤", "⚠️ ⚠️ ⚠️", true);

  document.getElementById("text").innerHTML =
    "成為釘子戶。";

  document.getElementById("choices").innerHTML =
    '<button class="restart" onclick="restart()">重新開始</button>';

  document.getElementById("note").innerHTML =
    "歷史提示：都市更新過程中，地主、政府與開發者之間常出現土地協商與補償爭議。";
}

function rentLand() {
  animateScene("🏭 💨 🏭 💨 🏭", "🤔", "💨 💨 💨", true);

  document.getElementById("text").innerHTML =
    "出現面對二房東違規出租，你會選擇？";

  document.getElementById("choices").innerHTML =
    '<button onclick="ignoreSublease()">A. 睜一隻眼閉一隻眼</button>' +
    '<button onclick="reportSublease()">B. 檢舉二房東</button>';

  document.getElementById("note").innerHTML =
    "歷史提示：農地出租後，可能因管理鬆散而出現二房東、違章工廠或非法使用。";
}

function ignoreSublease() {
  animateScene("🏭 🏭 🏢 💰 🏢", "😎", "💰 ✨ 💰", false);

  document.getElementById("text").innerHTML =
    "等到都更，新莊發大財！";

  document.getElementById("choices").innerHTML =
    '<button class="restart" onclick="restart()">重新開始</button>';

  document.getElementById("note").innerHTML =
    "歷史提示：都市化後，土地價值可能上升，但違章建築與工業污染也可能成為地方問題。";
}

function reportSublease() {
  animateScene("📢 🏭 🚫 🏚️", "😭", "❌ ❌ ❌", true);

  document.getElementById("text").innerHTML =
    "政府沒有取締，少賺多年房租。";

  document.getElementById("choices").innerHTML =
    '<button class="restart" onclick="restart()">重新開始</button>';

  document.getElementById("note").innerHTML =
    "歷史提示：違章工廠、土地使用與執法落差，反映都市邊緣發展的複雜性。";
}

function restart() {
  location.reload();
}
</script>

</body>
</html>
